
<!doctype html>
<html lang="{{ 'ru' if lang=='ru' else 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or _('meta.title') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        svg: { fontCache: 'global' },
        options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
      };
    </script>
    <script id="mathjax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <a href="{{ url_for('home') }}">DREAM</a>
      </div>
      <nav class="nav">
        {% for key,label_key,href in NAV %}
          <a class="nav-link {% if request.path==href %}active{% endif %}" href="{{ href }}">{{ _(label_key) }}</a>
        {% endfor %}
      </nav>
      <div class="controls">
        <div class="toggles">
          <label class="switch" title="{{ _('ui.math_toggle') }}">
            <input type="checkbox" id="mathToggle">
            <span class="slider"></span>
            <span class="switch-label">{{ _('ui.math') }}</span>
          </label>
          <label class="switch" title="{{ _('ui.spec_toggle') }}">
            <input type="checkbox" id="specToggle">
            <span class="slider"></span>
            <span class="switch-label">{{ _('ui.speculative') }}</span>
          </label>
        </div>
<div class="lang">
  <a class="lang-link {% if lang == 'ru' %}on{% endif %}" 
     href="{{ url_for('setlang', lang_code='ru') }}" 
     title="Русский">
    <img
      src="https://flagcdn.com/16x12/ru.png"
      srcset="https://flagcdn.com/32x24/ru.png 2x,
              https://flagcdn.com/48x36/ru.png 3x"
      width="16"
      height="12"
      alt="Russia"
      class="flag-icon">
  </a>
  <span class="sep">·</span>
  <a class="lang-link {% if lang == 'en' %}on{% endif %}" 
     href="{{ url_for('setlang', lang_code='en') }}" 
     title="English">
    <img
      src="https://flagcdn.com/16x12/gb.png"
      srcset="https://flagcdn.com/32x24/gb.png 2x,
              https://flagcdn.com/48x36/gb.png 3x"
      width="16"
      height="12"
      alt="United Kingdom"
      class="flag-icon">
  </a>
</div>

      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div>
        <small>© {{ 2025 }} DREAM — {{ _('meta.footer') }}</small>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}?v=3"></script>
  
<script>
(function(){
  const mathCb = document.getElementById('mathToggle') || document.getElementById('toggle-math');
  const specCb = document.getElementById('specToggle') || document.getElementById('toggle-spec');
  if (mathCb) mathCb.checked = localStorage.getItem('showMath') === '1';
  if (specCb) specCb.checked = localStorage.getItem('showSpec') === '1';
  function apply(){
    document.body.classList.toggle('show-math', !!(mathCb && mathCb.checked));
    document.body.classList.toggle('show-spec', !!(specCb && specCb.checked));
    if (mathCb && mathCb.checked && window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
  }
  apply();
  mathCb && mathCb.addEventListener('change', e => { localStorage.setItem('showMath', e.target.checked ? '1':'0'); apply(); });
  specCb && specCb.addEventListener('change', e => { localStorage.setItem('showSpec', e.target.checked ? '1':'0'); apply(); });
})();
</script>

</body>
</html>
