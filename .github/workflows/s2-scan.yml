name: DREAM S2 Auto-Scan

on:
  schedule:
    # Run every day at 03:17 UTC (off-peak, avoids GitHub cron congestion)
    - cron: '17 3 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy

      - name: Run auto-scanner with model-comparison gate
        env:
          SCAN_OUT: /tmp/dream_scan
          TESTS_HTML: en/tests.html
          GROQ_BACKEND_URL: ${{ secrets.GROQ_BACKEND_URL }}
        run: |
          python scripts/dream_auto_scanner.py

      - name: Commit & push if tests.html changed
        run: |
          git config user.name  "dream-bot"
          git config user.email "dream-bot@users.noreply.github.com"
          git add en/tests.html ru/tests.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new S2_WINS entries today — skipping commit."
          else
            STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "auto-scan: $STAMP — S2 gate (AICc) update"
            git push origin gh-pages
            echo "Pushed new test entries to gh-pages."
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: /tmp/dream_scan/
          retention-days: 14
